name: release

# On a vX.Y.Z tag, build the container and push it to GHCR as both the version
# tag and `latest`. linux/amd64 only for the MVP; the Dockerfile's GOARCH=$TARGETARCH
# makes arm64 a one-line `platforms:` change away.
#
# Then sign what we ship (keyless GitHub OIDC, Sigstore/Fulcio):
#   1. build-provenance attestation — proves *how* the image was built.
#   2. SBOM attestation — proves *what's in it*, generated by running the
#      just-shipped image against itself, bound to the same digest.
# Both are pushed to the registry as OCI referrers (cosign-verifiable) and
# verified in-workflow so a broken signing step fails the release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write # mint the OIDC token for keyless Sigstore signing
  attestations: write # write attestations to the GitHub attestations API

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # github.repository is mixed-case (NissesSenap/…); GHCR refs must be lowercase.
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 1. Provenance: how the image was built.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # 2. SBOM: what's in the image. Run the just-shipped image against itself
      #    (trivy pulls the same digest with the workflow token) — the bundled
      #    tools produce a validated 1.6 SBOM on stdout, logs go to stderr.
      - name: Generate SBOM for the release image
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}"
          docker run --rm \
            -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            "$ref" --image "$ref" --supplier-name "sbom-quality" \
            > sbom.cdx.json

      - uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

      # 3. Smoke check: a broken signing step must fail the release.
      - name: Verify attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="oci://${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}"
          # default predicate-type is SLSA provenance
          gh attestation verify "$ref" --repo "$GITHUB_REPOSITORY"
          gh attestation verify "$ref" --repo "$GITHUB_REPOSITORY" \
            --predicate-type https://cyclonedx.org/bom
