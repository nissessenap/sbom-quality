name: sbomqs gate (rust)

# Rust golden gate: build a dependency SBOM from the cargo fixture via BOTH supported
# generators (cargo-cyclonedx 1.5 up-converted, and cdxgen 1.6), run each through the
# full --sbom pipeline, and fail if the sbomqs score regresses below the floor in
# scripts/sbomqs-gate-rust.sh or sbom-utility rejects 1.6 conformance. Independent of the
# Go/Java/npm gates — it needs only Rust + cdxgen (Node), so they never grow a Rust dep.
on:
  pull_request:
    # Docs-only PRs can't change the produced SBOM; skip the gate. paths-ignore (not
    # an allowlist) keeps the gate running on any code/script/workflow change.
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel a superseded in-progress run when a PR is pushed again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sbomqs-gate-rust:
    runs-on: ubuntu-latest
    env:
      PARLAY_VERSION: v0.11.0
      SBOM_UTILITY_VERSION: v0.19.2
      SBOMQS_VERSION: v2.0.8
      CARGO_CYCLONEDX_VERSION: 0.5.9
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # cdxgen is a Node CLI; Rust toolchain ships on ubuntu-latest runners already.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SBOM tools
        run: |
          go install "github.com/snyk/parlay@${PARLAY_VERSION}"
          go install "github.com/CycloneDX/sbom-utility@${SBOM_UTILITY_VERSION}"
          go install "github.com/interlynk-io/sbomqs/v2@${SBOMQS_VERSION}"
          npm install -g @cyclonedx/cdxgen
          # cargo-cyclonedx: pinned prebuilt release binary (compiling from source with
          # `cargo install` adds minutes). cargo finds it as a subcommand from PATH.
          curl -sSLf -o /tmp/cc.tar.xz \
            "https://github.com/CycloneDX/cyclonedx-rust-cargo/releases/download/cargo-cyclonedx-${CARGO_CYCLONEDX_VERSION}/cargo-cyclonedx-x86_64-unknown-linux-gnu.tar.xz"
          mkdir -p "$HOME/.local/bin"
          tar -xJf /tmp/cc.tar.xz --strip-components=1 -C "$HOME/.local/bin" \
            cargo-cyclonedx-x86_64-unknown-linux-gnu/cargo-cyclonedx
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: sbomqs gate (rust, scored)
        run: ./scripts/sbomqs-gate-rust.sh
