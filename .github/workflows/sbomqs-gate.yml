name: sbomqs gate

# Generate an SBOM with the tool and fail if its sbomqs score regresses below
# the floor in scripts/sbomqs-gate.sh. Ratchet the floor up as score-lifting
# stages land.
on:
  pull_request:

permissions:
  contents: read

jobs:
  sbomqs-gate:
    runs-on: ubuntu-latest
    env:
      CYCLONEDX_GOMOD_VERSION: v1.10.0
      SBOMASM_VERSION: v2.0.9
      PARLAY_VERSION: v0.11.0
      SBOM_UTILITY_VERSION: v0.19.2
      SBOMQS_VERSION: v2.0.8
      TRIVY_VERSION: v0.72.0
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install SBOM tools
        run: |
          go install "github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}"
          go install "github.com/interlynk-io/sbomasm/v2@${SBOMASM_VERSION}"
          go install "github.com/snyk/parlay@${PARLAY_VERSION}"
          go install "github.com/CycloneDX/sbom-utility@${SBOM_UTILITY_VERSION}"
          go install "github.com/interlynk-io/sbomqs/v2@${SBOMQS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install trivy
        run: |
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          sudo install trivy /usr/local/bin/trivy
          rm trivy trivy.tar.gz
          trivy --version

      - name: sbomqs gate
        run: ./scripts/sbomqs-gate.sh

  # Prove the container builds and runs the identical code path before a release
  # tag ever touches it. Not the score authority (that is the job above) — this
  # just asserts the bundled tools produce a valid 1.6 SBOM inside the image.
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t sbom-quality:ci .

      - name: Run pipeline in container
        run: |
          work="$(mktemp -d)"
          cp testdata/fixture-module/{go.mod,go.sum,main.go} "$work/"
          git -C "$work" init -q
          git -C "$work" add -A
          git -C "$work" -c user.email=ci@example.com -c user.name=ci commit -qm fixture
          git -C "$work" tag v0.1.0
          # The in-pipeline sbom-utility validate means exit 0 == valid SBOM.
          docker run --rm -v "$work":/work sbom-quality:ci \
            --go-mod /work --supplier-name "sbom-quality CI" > "$work/out.cdx.json"
          grep -q '"specVersion": *"1.6"' "$work/out.cdx.json"
          echo "OK: container produced a valid 1.6 SBOM"
