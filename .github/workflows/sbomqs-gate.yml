name: sbomqs gate

# Generate an SBOM with the tool and fail if its sbomqs score regresses below
# the floor in scripts/sbomqs-gate.sh. Ratchet the floor up as score-lifting
# stages land.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sbomqs-gate:
    runs-on: ubuntu-latest
    env:
      CYCLONEDX_GOMOD_VERSION: v1.10.0
      SBOMASM_VERSION: v2.0.9
      SBOM_UTILITY_VERSION: v0.19.2
      SBOMQS_VERSION: v2.0.8
      TRIVY_VERSION: v0.58.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SBOM tools
        run: |
          go install "github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}"
          go install "github.com/interlynk-io/sbomasm/v2@${SBOMASM_VERSION}"
          go install "github.com/CycloneDX/sbom-utility@${SBOM_UTILITY_VERSION}"
          go install "github.com/interlynk-io/sbomqs/v2@${SBOMQS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: sbomqs gate
        run: ./scripts/sbomqs-gate.sh
